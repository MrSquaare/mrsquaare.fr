name: "@mrsquaare-fr/web Pull Request"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    name: Checks

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build
        run: pnpm build --filter @mrsquaare-fr/web

      - name: Check
        run: pnpm check --filter @mrsquaare-fr/web

  docker:
    runs-on: ubuntu-latest
    name: Build Docker Image

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0.0

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.3.0
        with:
          context: .
          push: false
          file: ./apps/web/Dockerfile
          tags: image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
